[font]
normal = { family = "monospace" }
size = 10

[window]
padding = { x = 6, y = 6 }
decorations = "none"
opacity = 0.8

[colors.primary]
background = "#000000"
foreground = "#c5c8c6"

[colors.normal]
black   = "#1d1f21"
red     = "#cc6666"
green   = "#b5bd68"
yellow  = "#f0c674"
blue    = "#81a2be"
magenta = "#b294bb"
cyan    = "#8abeb7"
white   = "#c5c8c6"

[colors.bright]
black   = "#000000"
red     = "#ff0008"
green   = "#91ff00"
yellow  = "#ffd900"
blue    = "#0073ff"
magenta = "#bd30ff"
cyan    = "#00ffd0"
white   = "#ffffff"
